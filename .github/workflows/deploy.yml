name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Map Replit Assets to Your Photos
        run: |
          find src -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" \) -exec sed -i 's|[^"'"'"']*1st_Favorite_photo[^"'"'"']*\.png|../../public/photos/photo-1.png|g' {} +
          find src -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" \) -exec sed -i 's|[^"'"'"']*2nd_favorite_photo[^"'"'"']*\.png|../../public/photos/photo-2.png|g' {} +
          find src -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" \) -exec sed -i 's|[^"'"'"']*ate_together[^"'"'"']*\.png|../../public/photos/photo-3.png|g' {} +
          find src -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" \) -exec sed -i 's|[^"'"'"']*first_holding_hands[^"'"'"']*\.png|../../public/photos/photo-4.png|g' {} +
          find src -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" \) -exec sed -i 's|[^"'"'"']*first_photo_i_took_of_you[^"'"'"']*\.png|../../public/photos/photo-5.png|g' {} +
          find src -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" \) -exec sed -i 's|[^"'"'"']*first_photo_you_gave_me[^"'"'"']*\.png|../../public/photos/photo-6.png|g' {} +
          find src -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" \) -exec sed -i 's|[^"'"'"']*my_favorite_thing_you_gave_me[^"'"'"']*\.png|../../public/photos/photo-7.png|g' {} +
          find src -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" \) -exec sed -i 's|[^"'"'"']*our_first_date[^"'"'"']*\.png|../../public/photos/photo-1.png|g' {} +

      - name: Force Vite Config Base Path
        run: |
          sed -i "s|base:.*|base: '/${{ github.event.repository.name }}/',|g" vite.config.ts || true
          sed -i "/export default defineConfig({/a \  base: '/${{ github.event.repository.name }}/'," vite.config.ts

      - name: Build project
        run: npm run build
        env:
          PORT: 5173 # 👈 Feeds the required PORT variable into the build step to stop the crash

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
